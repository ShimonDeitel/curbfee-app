name: Curbfee
options:
  bundleIdPrefix: com.shimondeitel.hoadues
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Curbfee:
    type: application
    platform: iOS
    sources:
      - path: Curbfee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hoadues
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Curbfee/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CurbfeeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CurbfeeTests
      - path: Curbfee.storekit
    dependencies:
      - target: Curbfee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hoadues.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CurbfeeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CurbfeeUITests
    dependencies:
      - target: Curbfee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hoadues.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Curbfee:
    build:
      targets:
        Curbfee: all
        CurbfeeTests: [test]
        CurbfeeUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Curbfee.storekit
    test:
      config: Debug
      storeKitConfiguration: Curbfee.storekit
      targets:
        - CurbfeeTests
        - CurbfeeUITests
    archive:
      config: Release
